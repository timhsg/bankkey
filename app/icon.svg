<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond carré arrondi bleu marine (plus professionnel que le noir) -->
  <rect width="32" height="32" rx="7" fill="#1e3a8a"/>
  <!-- Anneau de la clé -->
  <circle cx="13" cy="14" r="5" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Trou central de la clé -->
  <circle cx="13" cy="14" r="1.8" fill="white"/>
  <!-- Tige de la clé -->
  <rect x="17.5" y="12.75" width="8.5" height="2.5" rx="1.25" fill="white"/>
  <!-- Dents (vers le bas) -->
  <rect x="21.5" y="15.25" width="2" height="2.5" rx="1" fill="white"/>
  <rect x="24.5" y="15.25" width="2" height="2" rx="1" fill="white"/>
</svg>
